services:
  mysql:
    image: mysql:8.0
    container_name: club_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: club_business_ia
      MYSQL_USER: club_user
      MYSQL_PASSWORD: club_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  python-api:
    build:
      context: ../services/python-api
      dockerfile: Dockerfile
    container_name: club_python_api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://club_user:club_pass@mysql:3306/club_business_ia
      JWT_SECRET: club_business_ia_secret
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      WEBHOOK_AUTH_TOKEN: club_webhook_token
      ADMIN_EMAIL: admin@clubbusinessia.local
      ADMIN_PASSWORD: Admin123!
      ADMIN_NAME: Founder Admin
      ALLOWED_TARGETS: avvocati,pasticceri,ristoratori,gelatai,parrucchieri,aziende,privati
      REQUIRE_APPROVAL: "false"
      THREE_FACTOR_REQUIRED: "false"
      EMAIL_OTP_DEV_EXPOSE: "true"
      REQUIRE_REGISTRATION_OTP: "true"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: "gpt-4o-mini"
      SITE_CAPACITY: "200"
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  js-frontend:
    build:
      context: ../services/js-frontend
      dockerfile: Dockerfile
    container_name: club_js_frontend
    restart: unless-stopped
    environment:
      PYTHON_API_URL: http://python-api:8000
      PHP_API_URL: http://php-api:8080
    ports:
      - "3000:3000"
    depends_on:
      - python-api
      - php-api

  php-api:
    build:
      context: ../services/php-api
      dockerfile: Dockerfile
    container_name: club_php_api
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_NAME: club_business_ia
      DB_USER: club_user
      DB_PASS: club_pass
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
